url: https://itchyshin.github.io/prepR4pcm/

template:
  bootstrap: 5
  bslib:
    primary: "#2c5e4f"
    bg: "#ffffff"
    fg: "#222222"

home:
  title: "prepR4pcm: reconcile species names for phylogenetic comparative methods"
  description: >
    Reconcile species names across datasets and phylogenetic trees for
    ecologists and evolutionary biologists running PGLS, phylogenetic
    mixed models, and other PCMs. Sister package
    [pigauto](https://itchyshin.github.io/pigauto/) consumes the
    posterior of trees that prepR4pcm produces and propagates both
    tree- and imputation-uncertainty into pooled estimates.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: "Getting started"
        href: articles/getting-started.html
      - text: "Bird trait workflow (PGLS + PGLMM)"
        href: articles/bird-workflow.html
      - text: "Mammal database-assembly workflow"
        href: articles/db-assembly-workflow_mammals.html
      - text: "Posterior-tree pipeline (prepR4pcm + pigauto)"
        href: articles/posterior-tree-pipeline.html
      - text: "Comparing tree backends"
        href: articles/comparing-tree-backends.html

reference:

- title: "Package overview"
  contents:
  - prepR4pcm-package

- title: "Match species names"
  desc: >
    Build a reconciliation between your data and one or more reference
    sources (a tree, another dataset, or both). This is where most
    workflows begin.
  contents:
  - reconcile_tree
  - reconcile_data
  - reconcile_to_trees
  - reconcile_trees
  - reconcile_multi

- title: "Inspect and audit"
  desc: >
    Examine the results of a reconciliation: see what matched, what was
    flagged, and what is still unresolved. Produce reports for
    collaborators or supplementary materials.
  contents:
  - reconcile_summary
  - reconcile_mapping
  - reconcile_plot
  - reconcile_suggest
  - reconcile_diff
  - reconcile_report
  - reconcile_review
  - reconcile_splits_lumps

- title: "Corrections and crosswalks"
  desc: >
    Apply manual corrections by hand, in bulk, or from a published
    taxonomy crosswalk.
  contents:
  - reconcile_override
  - reconcile_override_batch
  - reconcile_crosswalk

- title: "Apply, merge, export"
  desc: >
    Turn a reconciliation into analysis-ready outputs --- aligned data
    frames, pruned trees, merged datasets, or files on disk.
  contents:
  - reconcile_apply
  - reconcile_merge
  - reconcile_export

- title: "Augment phylogenies (exploratory)"
  desc: >
    Graft unresolved species onto a tree using genus-level placement.
    For exploratory analyses only --- always run sensitivity analyses
    with and without augmented tips.
  contents:
  - reconcile_augment

- title: "Name utilities"
  desc: >
    Low-level helpers for cleaning scientific names and pulling tip
    labels off trees. Useful outside a full reconciliation workflow.
  contents:
  - pr_normalize_names
  - pr_extract_tips

- title: "Tree retrieval, dating, and citation"
  desc: >
    Retrieve a candidate phylogeny for a reconciled species list,
    time-calibrate an existing topology, or format the citations for
    a tree result. Five `pr_get_tree()` backends ship: rotl (CRAN,
    Open Tree of Life synthesis), rtrees (GitHub, taxon-specific
    mega-trees), clootl (GitHub, bird Clements taxonomy), fishtree
    (CRAN, Rabosky et al. 2018 fish chronogram), and datelife
    (GitHub, Sanchez Reyes et al. 2024 chronogram database). Each
    backend supports `n_tree > 1` for posterior samples to feed
    [pigauto](https://itchyshin.github.io/pigauto/) and similar
    multi-tree consumers. Backends live in `Suggests` (or GitHub)
    and are installed on demand.
  contents:
  - pr_get_tree
  - pr_date_tree
  - pr_cite_tree
  - pr_tree_compare

- title: "Tree-handling utilities"
  desc: >
    Helpers for the `pr_get_tree()` workflow: a backend health
    probe, an on-disk cache for repeat retrievals, and the
    `source = "auto"` / `tnrs = "auto"` controls (see
    `?pr_get_tree`).
  contents:
  - pr_get_tree_status
  - pr_tree_cache_dir
  - pr_tree_cache_status
  - pr_tree_cache_clear

- title: "Bundled bird data"
  desc: >
    Subsetted bird datasets and phylogenies used by the
    bird-workflow vignette. Full credit to the original data
    providers --- each help page lists the citation, and the README
    has a consolidated list.
  contents:
  - avonet_subset
  - nesttrait_subset
  - delhey_subset
  - tree_jetz
  - tree_clements25
  - crosswalk_birdlife_birdtree

- title: "Bundled mammal data"
  desc: >
    Subsetted mammal trait sources and an example phylogeny used by
    the db-assembly-workflow_mammals vignette. Each help page lists
    the citation; the mammal phylogeny has provenance pending
    confirmation (see the help page).
  contents:
  - mammal_amniote_example
  - mammal_pantheria_example
  - mammal_tetrapodtraits_example
  - mammal_tree_example
