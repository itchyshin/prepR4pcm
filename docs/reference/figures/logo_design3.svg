<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 577" width="500" height="577">
  <!-- Design 3: "Tree Growing from Data" — layout shifted up -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8c72"/>
      <stop offset="100%" stop-color="#1e4a3c"/>
    </linearGradient>
  </defs>

  <!-- Hex shape -->
  <polygon points="250,14 488,150 488,428 250,564 12,428 12,150"
           fill="url(#bg3)" stroke="#ffffff" stroke-width="8"
           stroke-linejoin="round"/>

  <!-- ===== Data bars (base/foundation) — shifted up ~60px ===== -->
  <g fill="#ffffff" opacity="0.35">
    <rect x="140" y="340" width="220" height="8" rx="4"/>
    <rect x="160" y="355" width="180" height="8" rx="4"/>
    <rect x="180" y="370" width="140" height="8" rx="4"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5">
    <rect x="140" y="340" width="220" height="8" rx="4"/>
    <rect x="160" y="355" width="180" height="8" rx="4"/>
    <rect x="180" y="370" width="140" height="8" rx="4"/>
  </g>

  <!-- ===== Tree trunk (grows from data bars) — shifted up ===== -->
  <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trunk -->
    <path d="M 250,335 V 260"/>
    <!-- First major split -->
    <path d="M 250,260 V 200"/>
    <path d="M 250,260 Q 310,250 340,215"/>
    <path d="M 250,260 Q 190,250 160,215"/>
    <!-- Upper splits from center -->
    <path d="M 250,200 Q 270,180 290,160"/>
    <path d="M 250,200 Q 230,180 210,160"/>
    <!-- Branch tips (right side) -->
    <path d="M 340,215 Q 355,195 370,185"/>
    <path d="M 340,215 Q 350,225 365,220"/>
    <!-- Branch tips (left side) -->
    <path d="M 160,215 Q 145,195 130,185"/>
    <path d="M 160,215 Q 150,225 135,220"/>
  </g>

  <!-- ===== Leaf dots at branch tips ===== -->
  <g fill="#f0c75e">
    <circle cx="290" cy="155" r="8"/>
    <circle cx="210" cy="155" r="8"/>
    <circle cx="370" cy="180" r="8"/>
    <circle cx="365" cy="217" r="6"/>
    <circle cx="130" cy="180" r="8"/>
    <circle cx="135" cy="217" r="6"/>
  </g>
  <!-- Subtle glow -->
  <g fill="#f0c75e" opacity="0.2">
    <circle cx="290" cy="155" r="14"/>
    <circle cx="210" cy="155" r="14"/>
    <circle cx="370" cy="180" r="14"/>
    <circle cx="130" cy="180" r="14"/>
  </g>

  <!-- ===== Connecting dots from data bars to trunk ===== -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="250" cy="340" r="3"/>
    <circle cx="250" cy="355" r="3"/>
    <circle cx="250" cy="370" r="3"/>
  </g>

  <!-- ===== Package name — well inside hex ===== -->
  <text x="250" y="440" text-anchor="middle" fill="#ffffff"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="44" font-weight="700" letter-spacing="1">
    prepR4pcm
  </text>

  <!-- Subtitle -->
  <text x="250" y="475" text-anchor="middle" fill="#b8e6d2"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="18" font-weight="400" letter-spacing="0.5">
    reconcile species data
  </text>
</svg>
