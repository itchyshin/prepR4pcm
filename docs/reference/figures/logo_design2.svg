<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 577" width="500" height="577">
  <!-- Design 2: "Merge Symbol" — layout shifted up -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c5e4f"/>
      <stop offset="100%" stop-color="#1a3a30"/>
    </linearGradient>
  </defs>

  <!-- Hex shape -->
  <polygon points="250,14 488,150 488,428 250,564 12,428 12,150"
           fill="url(#bg2)" stroke="#f0c75e" stroke-width="8"
           stroke-linejoin="round"/>
  <!-- Inner hex border -->
  <polygon points="250,30 474,158 474,420 250,548 26,420 26,158"
           fill="none" stroke="#f0c75e" stroke-width="2" opacity="0.3"
           stroke-linejoin="round"/>

  <!-- ===== Tree icon (left circle) — shifted up ~60px ===== -->
  <circle cx="165" cy="210" r="62" fill="#347a66" stroke="#ffffff" stroke-width="3"/>
  <!-- Mini tree inside circle -->
  <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 135,220 H 155"/>
    <path d="M 155,195 V 245"/>
    <path d="M 155,195 H 175"/>
    <path d="M 175,185 V 205"/>
    <path d="M 175,185 H 195"/>
    <path d="M 175,205 H 195"/>
    <path d="M 155,245 H 185"/>
    <path d="M 185,232 V 255"/>
    <path d="M 185,232 H 200"/>
    <path d="M 185,255 H 200"/>
  </g>

  <!-- ===== Data icon (right circle) — shifted up ===== -->
  <circle cx="335" cy="210" r="62" fill="#347a66" stroke="#ffffff" stroke-width="3"/>
  <!-- Mini data grid inside circle -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round">
    <rect x="305" y="184" width="60" height="52" rx="4"/>
    <line x1="305" y1="200" x2="365" y2="200"/>
    <line x1="305" y1="216" x2="365" y2="216"/>
    <line x1="335" y1="184" x2="335" y2="236"/>
  </g>
  <!-- Data cells -->
  <g fill="#ffffff" opacity="0.2">
    <rect x="308" y="187" width="24" height="10" rx="2"/>
    <rect x="338" y="187" width="24" height="10" rx="2"/>
  </g>

  <!-- ===== Labels ===== -->
  <text x="165" y="292" text-anchor="middle" fill="#9fd4be"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="400" font-style="italic">
    tree
  </text>
  <text x="335" y="292" text-anchor="middle" fill="#9fd4be"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="400" font-style="italic">
    data
  </text>

  <!-- ===== Converging arrows — shifted up ===== -->
  <g stroke="#f0c75e" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 185,278 Q 210,340 250,355"/>
    <path d="M 315,278 Q 290,340 250,355"/>
  </g>
  <!-- Arrowhead -->
  <polygon points="250,375 240,355 260,355" fill="#f0c75e"/>

  <!-- ===== Merged result ===== -->
  <circle cx="250" cy="392" r="12" fill="none" stroke="#f0c75e" stroke-width="3"/>
  <circle cx="250" cy="392" r="5" fill="#f0c75e"/>

  <!-- ===== Package name — well inside hex ===== -->
  <text x="250" y="448" text-anchor="middle" fill="#ffffff"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="44" font-weight="700" letter-spacing="1">
    prepR4pcm
  </text>

  <!-- Subtitle -->
  <text x="250" y="480" text-anchor="middle" fill="#9fd4be"
        font-family="'Fira Sans','Helvetica Neue',Arial,sans-serif"
        font-size="18" font-weight="400">
    reconcile species data
  </text>
</svg>
